<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-tint": "#000000",
                      "tertiary-fixed": "#f1f5f9",
                      "inverse-on-surface": "#f8fafc",
                      "on-secondary-container": "#0f172a",
                      "surface-container": "#f1f3f5",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-fixed": "#0f172a",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#e2e8f0",
                      "primary-fixed": "#000000",
                      "on-secondary": "#ffffff",
                      "inverse-primary": "#ffffff",
                      "primary": "#000000",
                      "on-surface": "#0f172a",
                      "on-primary-fixed-variant": "#94a3b8",
                      "on-error": "#ffffff",
                      "background": "#f7f7f7",
                      "error-container": "#fff1f2",
                      "tertiary": "#000000",
                      "primary-fixed-dim": "#1e293b",
                      "surface-bright": "#ffffff",
                      "on-error-container": "#4c0519",
                      "tertiary-container": "#334155",
                      "on-background": "#0f172a",
                      "on-secondary-fixed": "#0f172a",
                      "secondary-fixed": "#f1f5f9",
                      "on-tertiary-fixed-variant": "#475569",
                      "on-secondary-fixed-variant": "#475569",
                      "inverse-surface": "#1e293b",
                      "surface-container-highest": "#dee2e6",
                      "secondary": "#475569",
                      "on-surface-variant": "#64748b",
                      "secondary-container": "#f1f5f9",
                      "outline": "#e2e8f0",
                      "outline-variant": "#cbd5e1",
                      "on-tertiary-container": "#f1f5f9",
                      "surface-dim": "#f7f7f7",
                      "surface-container-high": "#e9ecef",
                      "error": "#e11d48",
                      "surface-container-low": "#f8f9fa",
                      "on-primary-fixed": "#ffffff",
                      "on-primary": "#ffffff",
                      "surface-variant": "#f1f5f9",
                      "on-primary-container": "#f8fafc",
                      "primary-container": "#1e293b",
                      "tertiary-fixed-dim": "#e2e8f0",
                      "surface": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Inter"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<header class="bg-white/80 dark:bg-black/80 backdrop-blur-md font-inter tracking-tight docked full-width top-0 sticky shadow-sm dark:shadow-none z-50">
<div class="flex justify-between items-center w-full px-8 py-4 max-w-full">
<div class="text-xl font-black text-slate-900 dark:text-slate-50 uppercase">SkillsUp</div>
<nav class="hidden md:flex items-center space-x-8">
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Features</a>
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Pricing</a>
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Community</a>
</nav>
<div class="flex items-center gap-4">
<button class="text-slate-900 dark:text-white font-bold border-b-2 border-black dark:border-white active:scale-95 transition-transform px-1 py-0.5">Sign In</button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-8">
<div class="w-full max-w-md">
<div class="bg-surface p-10 shadow-sm border border-outline/10 rounded-lg">
<div class="mb-10 text-center">
<h1 class="text-3xl font-black tracking-tighter text-primary mb-2 uppercase">Welcome Back</h1>
<p class="text-[10px] uppercase tracking-[0.15em] font-medium text-on-surface-variant">Access your SkillsUp dashboard</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant block ml-1">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline focus:border-primary focus:ring-0 transition-colors text-sm font-medium outline-none" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-end mb-1">
<label class="text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant block ml-1">Password</label>
<a class="text-[10px] uppercase tracking-[0.1em] font-bold text-primary hover:opacity-70 transition-opacity" href="#">Forgot Password?</a>
</div>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline focus:border-primary focus:ring-0 transition-colors text-sm font-medium outline-none" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center">
<input class="w-4 h-4 border-outline rounded text-primary focus:ring-0 focus:ring-offset-0 transition-colors" id="remember" type="checkbox"/>
<label class="ml-3 text-xs font-medium text-on-surface-variant" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-bold uppercase tracking-widest text-xs active:scale-95 transition-all hover:bg-zinc-800 shadow-lg shadow-black/5" type="submit">
                        Sign In
                    </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em] font-bold">
<span class="bg-surface px-4 text-on-surface-variant">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 px-4 py-3 border border-outline hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">google</span>
<span class="text-[10px] uppercase font-bold tracking-wider">Google</span>
</button>
<button class="flex items-center justify-center gap-3 px-4 py-3 border border-outline hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-[10px] uppercase font-bold tracking-wider">Apple</span>
</button>
</div>
<p class="mt-10 text-center text-xs text-on-surface-variant font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold border-b border-primary/20 hover:border-primary transition-colors" href="#">Create account</a>
</p>
</div>
</div>
</main>
<footer class="bg-slate-50 dark:bg-slate-950 full-width border-t border-slate-100 dark:border-slate-900 border-t border-slate-100 dark:border-slate-800 flat no shadows w-full px-8 py-12 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-sm font-bold text-slate-900 dark:text-slate-50 uppercase tracking-tighter">SkillsUp</div>
<div class="flex gap-8">
<a class="text-[10px] uppercase tracking-[0.1em] font-medium text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-[0.1em] font-medium text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-[0.1em] font-medium text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Help Center</a>
</div>
<div class="text-[10px] uppercase tracking-[0.1em] font-medium text-slate-400 dark:text-slate-600">
            © 2024 SkillsUp Editorial. All rights reserved.
        </div>
</footer>
</body></html>

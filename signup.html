<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | SkillsUp</title>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar (Suppressed for focused Transactional state per instructions, but requested by user prompt - prioritising explicit user request for the visual shell here while keeping clean) -->
<header class="bg-white/80 dark:bg-black/80 backdrop-blur-md text-slate-900 dark:text-slate-50 font-inter tracking-tight docked full-width top-0 sticky shadow-sm dark:shadow-none flex justify-between items-center w-full px-8 py-4 max-w-full z-50">
<div class="text-xl font-black text-slate-900 dark:text-slate-50">SkillsUp</div>
<nav class="hidden md:flex gap-8">
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Features</a>
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Pricing</a>
<a class="text-slate-500 dark:text-slate-400 font-medium hover:text-black dark:hover:text-white transition-colors" href="#">Community</a>
</nav>
<div class="flex items-center gap-4">
<a class="text-slate-900 dark:text-slate-50 font-medium text-sm hover:underline" href="#">Log In</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-8 md:p-12">
<!-- Registration Card -->
<div class="w-full max-w-md bg-surface shadow-sm border border-outline/30 rounded-xl p-8 md:p-10">
<div class="mb-8">
<h1 class="text-3xl font-black tracking-tight mb-2">Create Account</h1>
<p class="text-on-surface-variant text-sm">Join the next generation of professional editors.</p>
</div>
<form class="space-y-5">
<!-- Full Name -->
<div>
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2">Full Name</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-0 focus:border-primary text-on-surface transition-all" placeholder="Jane Doe" type="text"/>
</div>
<!-- Email Address -->
<div>
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-0 focus:border-primary text-on-surface transition-all" placeholder="jane@skillsup.com" type="email"/>
</div>
<!-- Password -->
<div>
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2">Password</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-0 focus:border-primary text-on-surface transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2">Confirm Password</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-0 focus:border-primary text-on-surface transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-lg active:scale-95 transition-transform mt-4" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface px-4 text-on-surface-variant tracking-[0.1em] font-medium">Or continue with</span>
</div>
</div>
<!-- Social Sign Up -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-3 border border-outline rounded-lg hover:bg-surface-container-low transition-colors active:scale-95">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-3 border border-outline rounded-lg hover:bg-surface-container-low transition-colors active:scale-95">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.04 1.44-3.14 1.44-1.12 0-2.04-.42-3.11-1.44-1.07-1.02-2.14-1.53-3.21-1.53-1.07 0-2.14.51-3.21 1.53-1.07 1.02-1.99 1.44-3.11 1.44-1.1 0-2.18-.49-3.14-1.44C1.04 19.33 0 17.5 0 15.54c0-1.96 1.04-3.79 3.12-5.74.96-.95 2.04-1.44 3.14-1.44 1.12 0 2.04.42 3.11 1.44 1.07 1.02 2.14 1.53 3.21 1.53 1.07 0 2.14-.51 3.21-1.53 1.07-1.02 1.99-1.44 3.11-1.44 1.1 0 2.18.49 3.14 1.44C22.96 11.75 24 13.58 24 15.54c0 1.96-1.04 3.79-3.12 5.74-.96.95-2.04 1.44-3.14 1.44-1.12 0-2.04-.42-3.11-1.44-1.07-1.02-2.14-1.53-3.21-1.53-1.07 0-2.14.51-3.21 1.53z" fill="currentColor"></path>
</svg>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<!-- Login Link -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 text-[10px] uppercase tracking-[0.1em] font-medium full-width border-t border-slate-100 dark:border-slate-900 shadow-none w-full px-8 py-12 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-sm font-bold text-slate-900 dark:text-slate-50">SkillsUp</div>
<div class="flex gap-8">
<a class="text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Privacy Policy</a>
<a class="text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Terms of Service</a>
<a class="text-slate-400 dark:text-slate-600 hover:text-slate-900 dark:hover:text-slate-100 transition-opacity duration-200" href="#">Help Center</a>
</div>
<div class="text-slate-400 dark:text-slate-600">© 2024 SkillsUp Editorial. All rights reserved.</div>
</footer>
</body></html>
